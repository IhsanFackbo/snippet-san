<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>sanSh Code</title>
<meta name="description" content="Tempel, simpan, dan bagikan potongan kode dengan cepat.">
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/base16/gruvbox-dark-medium.min.css">
</head>
<body>

<header class="topbar">
  <div class="topbar-text">
    <h1>Saxn Share<span class="dot">Code</span></h1>
    <span class="tagline">tempel &middot; simpan &middot; bagikan kode</span>
  </div>
  <a href="new.html" class="btn-primary btn-add">+ Tambah Snippet</a>
</header>

<main class="single-col">
  <div id="shared-banner-slot"></div>

  <div class="toolbar">
    <input type="search" id="search" placeholder="Cari judul, isi kode, atau bahasa...">
    <select id="filter-lang">
      <option value="">Semua bahasa</option>
    </select>
    <span class="count-pill" id="count-pill"></span>
  </div>

  <div class="panel-footer" style="margin-bottom:1.1rem">
    <button class="btn-ghost" id="btn-export">Ekspor semua (.json)</button>
    <button class="btn-ghost" id="btn-import">Impor .json</button>
    <input type="file" id="file-import" accept="application/json" hidden>
  </div>

  <div class="grid" id="grid"></div>
</main>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="assets/js/store.js"></script>
<script src="assets/js/list.js"></script>
</body>
</html>
