<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IbuSatset Code</title>
<meta name="description" content="Tempel, simpan, dan bagikan potongan kode dengan cepat.">
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/base16/gruvbox-dark-medium.min.css">
</head>
<body>

<header class="topbar">
  <h1>IbuSatset<span class="dot">Code</span></h1>
  <span class="tagline">tempel &middot; simpan &middot; bagikan kode</span>
</header>

<main>
  <section class="panel">
    <h2>Tempel kode baru</h2>
    <form id="snip-form">
      <div class="field">
        <label for="f-title">Judul</label>
        <input id="f-title" type="text" placeholder="Misal: Fix conn.sendMessage" required>
      </div>
      <div class="row2">
        <div class="field">
          <label for="f-lang">Bahasa</label>
          <select id="f-lang">
            <option value="javascript">JavaScript</option>
            <option value="php">PHP</option>
            <option value="bash">Bash</option>
            <option value="json">JSON</option>
            <option value="html">HTML</option>
            <option value="css">CSS</option>
            <option value="sql">SQL</option>
            <option value="python">Python</option>
            <option value="plaintext">Lainnya</option>
          </select>
        </div>
        <div class="field">
          <label for="f-filename">Nama file</label>
          <input id="f-filename" type="text" placeholder="plugin.js">
        </div>
      </div>
      <div class="field">
        <label for="f-subtitle">Catatan singkat</label>
        <input id="f-subtitle" type="text" placeholder="Konteks singkat (opsional)">
      </div>
      <div class="field">
        <label for="f-code">Kode</label>
        <textarea id="f-code" placeholder="Tempel kode hasil scrape / kode yang mau dibagikan di sini..." required spellcheck="false"></textarea>
      </div>
      <div class="field">
        <label for="f-author">Nama / sumber</label>
        <input id="f-author" type="text" placeholder="Isan">
      </div>
      <button type="submit" class="btn-primary">Simpan snippet</button>
    </form>
    <div class="panel-footer">
      <button class="btn-ghost" id="btn-export">Ekspor semua (.json)</button>
      <button class="btn-ghost" id="btn-import">Impor .json</button>
      <input type="file" id="file-import" accept="application/json" hidden>
    </div>
  </section>

  <section id="content-area">
    <div id="shared-banner-slot"></div>

    <div class="toolbar">
      <input type="search" id="search" placeholder="Cari judul, isi kode, atau bahasa...">
      <select id="filter-lang">
        <option value="">Semua bahasa</option>
      </select>
      <span class="count-pill" id="count-pill"></span>
    </div>

    <div class="grid" id="grid"></div>
  </section>
</main>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="assets/js/app.js"></script>
</body>
</html>
